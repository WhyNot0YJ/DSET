model:
  model_name: "yolo12n.pt"
  pretrained_weights: "pretrained/yolo12n.pt"

training:
  epochs: 200
  batch_size: 8
  imgsz: 640
  optimizer: "auto"
  lr0: 0.01
  lrf: 0.01
  momentum: 0.937
  weight_decay: 0.0005
  warmup_epochs: 3.0
  warmup_momentum: 0.8
  warmup_bias_lr: 0.1
  save_period: 10
  cos_lr: true
  seed: 42
  deterministic: false
  patience: 20
  
data:
  data_yaml: "datasets/DAIR-V2X_YOLO/dairv2x.yaml"

checkpoint:
  log_dir: "logs"

misc:
  device: "cuda"
  num_workers: 2
