# MOE RT-DETR（UA-DETRAC，仅 S5 进 Hybrid Encoder）
model:
  num_experts: 6
  top_k: 3
  moe_noise_std: 0.1
  backbone: presnet18
  ablation:
    enable_cas_predictor: false
    enable_decoder_moe: true
  encoder:
    use_encoder_idx:
    - 2
    in_channels:
    - 128
    - 256
    - 512
    expansion: 0.5
    num_encoder_layers: 1
  pretrained_weights: pretrained/rtdetrv2_r18vd_120e_coco_rerun_48.1.pth
  num_decoder_layers: 3
  hidden_dim: 256
  decoder_hidden_dim: 256
  num_queries: 300
  cas_detr:
    token_keep_ratio: 1.0
    use_cass: false
    cass_loss_weight: 0.05
    cass_expansion_ratio: 0.8
    cass_min_size: 1.0
    use_subpixel_offset: true
    cass_loss_type: vfl
    cass_focal_alpha: 2.0
    cass_focal_beta: 4.0
training:
  epochs: 50
  batch_size: 16
  warmup_epochs: 3
  pretrained_lr: 1e-5
  new_lr: 1e-4
  eta_min: 1e-6
  weight_decay: 0.0001
  ema_decay: 0.9999
  clip_max_norm: 10.0
  scheduler: cosine
  early_stopping_patience: 20
  early_stopping_metric: mAP_0.5_0.95
  seed: 42
  deterministic: false
  decoder_moe_balance_weight: 0.01
  moe_balance_warmup_epochs: 0
  eval_schedule:
    - until_epoch: 20
      every: 10
    - until_epoch: null
      since_epoch: 20
      every: 2
data:
  data_root: /root/autodl-fs/datasets/UA-DETRAC_COCO
  dataset_class: CocoFolderDetection
  num_classes: 4
  class_names:
    - car
    - van
    - bus
    - others
augmentation:
  target_size: 640
  stop_epoch: 21
  scales:
    - 640
  normalize_mean:
    - 0.485
    - 0.456
    - 0.406
  normalize_std:
    - 0.229
    - 0.224
    - 0.225
  photometric_distort_p: 0.3
  zoom_out_enabled: false
  iou_crop_p: 0
  horizontal_flip_p: 0.5
  letterbox_fill: 114
  resize:
    letterbox_fill: 114
checkpoint:
  resume_mode: auto
  log_dir: logs
misc:
  device: cuda
  num_workers: 16
  pin_memory: true
  prefetch_factor: 4
