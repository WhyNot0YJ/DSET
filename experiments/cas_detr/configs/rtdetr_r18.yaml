# RT-DETR R18 · DAIR-V2X
model:
  backbone: presnet18
  ablation:
    enable_cas_predictor: false
    enable_decoder_moe: false
  encoder:
    use_encoder_idx:
    - 2
    in_channels:
    - 128
    - 256
    - 512
    expansion: 0.5
    num_encoder_layers: 1
  pretrained_weights: pretrained/rtdetrv2_r18vd_120e_coco_rerun_48.1.pth
  num_decoder_layers: 3
  hidden_dim: 256
  decoder_hidden_dim: 256
  num_queries: 300
  cas_detr:
    token_keep_ratio: 1.0
    use_cass: false
    cass_loss_weight: 0.05
    cass_expansion_ratio: 0.8
    cass_min_size: 1.0
    use_subpixel_offset: true
    cass_loss_type: vfl
    cass_focal_alpha: 2.0
    cass_focal_beta: 4.0
training:
  epochs: 100
  batch_size: 24
  warmup_epochs: 3
  pretrained_lr: 1e-5
  new_lr: 1e-4
  eta_min: 1e-6
  weight_decay: 0.0001
  ema_decay: 0.9999
  clip_max_norm: 10.0
  scheduler: cosine
  early_stopping_patience: 20
  early_stopping_metric: mAP_0.5_0.95
  seed: 666
  deterministic: false
  eval_schedule:
    - until_epoch: 50
      every: 10
    - until_epoch: 70
      every: 5
    - until_epoch: 90
      every: 2
    - until_epoch: null
      always: true
data:
  data_root: /root/autodl-fs/datasets/DAIR-V2X
  dataset_class: DAIRV2XDetection
  num_classes: 8
  class_names:
    - Car
    - Truck
    - Van
    - Bus
    - Pedestrian
    - Cyclist
    - Motorcyclist
    - Trafficcone
augmentation:
  target_size: 640
  stop_epoch: 50
  scales:
    - 576
    - 608
    - 640
    - 640
    - 640
    - 672
    - 704
  normalize_mean:
    - 0.485
    - 0.456
    - 0.406
  normalize_std:
    - 0.229
    - 0.224
    - 0.225
  photometric_distort_p: 0.5
  zoom_out_enabled: true
  iou_crop_p: 0.3
  horizontal_flip_p: 0.5
  letterbox_fill: 114
  resize:
    letterbox_fill: 114
checkpoint:
  resume_mode: auto
  log_dir: logs
misc:
  device: cuda
  num_workers: 16
  pin_memory: true
  prefetch_factor: 4
