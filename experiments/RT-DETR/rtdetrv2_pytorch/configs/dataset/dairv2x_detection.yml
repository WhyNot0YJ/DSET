task: detection

evaluator:
  type: CocoEvaluator
  iou_types: ['bbox']

# 与 COCO 预训练 (80 类) 混用时：-t 加载时分类头形状不匹配，不会载入（见 Load model.state_dict unmatched）
num_classes: 8
remap_mscoco_category: False

train_dataloader:
  type: DataLoader
  dataset:
    type: AutoCocoDetection
    data_root: /root/autodl-fs/datasets/DAIR-V2X
    split: train
    return_masks: False
    # 不显式写 transforms，以保留 base 配置里官方 include/dataloader.yml 的增强流水线
  shuffle: True
  num_workers: 4
  drop_last: True
  collate_fn:
    type: BatchImageCollateFunction

val_dataloader:
  type: DataLoader
  dataset:
    type: AutoCocoDetection
    data_root: /root/autodl-fs/datasets/DAIR-V2X
    split: val
    return_masks: False
  shuffle: False
  num_workers: 4
  drop_last: False
  collate_fn:
    type: BatchImageCollateFunction
