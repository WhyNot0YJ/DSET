task: detection
evaluator:
  type: CocoEvaluatorTrainLabelMapping
  iou_types:
  - bbox
num_classes: 8
remap_mscoco_category: false
train_dataloader:
  type: DataLoader
  dataset:
    type: AutoCocoDetection
    data_root: /root/autodl-fs/datasets/DAIR-V2X
    img_folder: /root/autodl-fs/datasets/DAIR-V2X
    split: train
    return_masks: false
    transforms:
      type: Compose
      ops:
      - type: RandomPhotometricDistort
        p: 0.5
      - type: RandomZoomOut
        fill: 0
      - type: RandomIoUCrop
        p: 0.8
      - type: SanitizeBoundingBoxes
        min_size: 1
      - type: RandomHorizontalFlip
      - type: Resize
        size:
        - 640
        - 640
      - type: SanitizeBoundingBoxes
        min_size: 1
      - type: ConvertPILImage
        dtype: float32
        scale: true
      - type: ConvertBoxes
        fmt: cxcywh
        normalize: true
      policy:
        name: stop_epoch
        epoch: 98
        ops:
        - RandomPhotometricDistort
        - RandomZoomOut
        - RandomIoUCrop
  shuffle: true
  num_workers: 4
  drop_last: true
  collate_fn:
    type: BatchImageCollateFunction
    scales: null
    stop_epoch: 59
  total_batch_size: 16
val_dataloader:
  type: DataLoader
  dataset:
    type: AutoCocoDetection
    data_root: /root/autodl-fs/datasets/DAIR-V2X
    img_folder: /root/autodl-fs/datasets/DAIR-V2X
    split: val
    return_masks: false
    transforms:
      type: Compose
      ops:
      - type: Resize
        size:
        - 640
        - 640
      - type: ConvertPILImage
        dtype: float32
        scale: true
  shuffle: false
  num_workers: 4
  drop_last: false
  collate_fn:
    type: BatchImageCollateFunction
  total_batch_size: 32
print_freq: 100
output_dir: outputs/batch_rtdetrv2_r18vd_100e_dairv2x_dairv2x
checkpoint_freq: 1
sync_bn: true
find_unused_parameters: false
use_amp: false
scaler:
  type: GradScaler
  enabled: true
use_ema: true
ema:
  type: ModelEMA
  decay: 0.9999
  warmups: 2000
epoches: 100
clip_max_norm: 0.1
optimizer:
  type: AdamW
  params:
  - params: ^(?=.*(?:norm|bn)).*$
    weight_decay: 0.0
  lr: 0.0001
  betas:
  - 0.9
  - 0.999
  weight_decay: 0.0001
lr_scheduler:
  type: MultiStepLR
  milestones:
  - 1000
  gamma: 0.1
lr_warmup_scheduler:
  type: LinearWarmup
  warmup_duration: 2000
model: RTDETR
criterion: RTDETRCriterionv2
postprocessor: RTDETRPostProcessor
use_focal_loss: true
eval_spatial_size:
- 640
- 640
RTDETR:
  backbone: PResNet
  encoder: HybridEncoder
  decoder: RTDETRTransformerv2
PResNet:
  depth: 18
  variant: d
  freeze_at: -1
  return_idx:
  - 1
  - 2
  - 3
  num_stages: 4
  freeze_norm: false
  pretrained: true
HybridEncoder:
  in_channels:
  - 128
  - 256
  - 512
  feat_strides:
  - 8
  - 16
  - 32
  hidden_dim: 256
  use_encoder_idx:
  - 2
  num_encoder_layers: 1
  nhead: 8
  dim_feedforward: 1024
  dropout: 0.0
  enc_act: gelu
  expansion: 0.5
  depth_mult: 1
  act: silu
RTDETRTransformerv2:
  feat_channels:
  - 256
  - 256
  - 256
  feat_strides:
  - 8
  - 16
  - 32
  hidden_dim: 256
  num_levels: 3
  num_layers: 3
  num_queries: 300
  num_denoising: 100
  label_noise_ratio: 0.5
  box_noise_scale: 1.0
  eval_idx: -1
  num_points:
  - 4
  - 4
  - 4
  cross_attn_method: default
  query_select_method: default
RTDETRPostProcessor:
  num_top_queries: 300
RTDETRCriterionv2:
  weight_dict:
    loss_vfl: 1
    loss_bbox: 5
    loss_giou: 2
  losses:
  - vfl
  - boxes
  alpha: 0.75
  gamma: 2.0
  matcher:
    type: HungarianMatcher
    weight_dict:
      cost_class: 2
      cost_bbox: 5
      cost_giou: 2
    alpha: 0.25
    gamma: 2.0
__include__:
- /root/autodl-tmp/CaS_DETR/experiments/RT-DETR/rtdetrv2_pytorch/configs/rtdetrv2/rtdetrv2_r18vd_100e_dairv2x.yml
- /root/autodl-tmp/CaS_DETR/experiments/RT-DETR/rtdetrv2_pytorch/configs/dataset/dairv2x_detection.yml
config: configs/rtdetrv2/rtdetrv2_r18vd_100e_dairv2x.yml
test_only: false
cas_eval: true
experiment_name: rtdetrv2_r18vd_100e_dairv2x_dairv2x
print_method: builtin
print_rank: 0
