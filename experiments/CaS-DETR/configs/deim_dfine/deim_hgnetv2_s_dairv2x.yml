__include__: [
  './deim_hgnetv2_s_coco.yml',
  '../dataset/dairv2x_detection.yml',
]

output_dir: ./outputs/deim_hgnetv2_s_dairv2x

tuning: pretrained/deim_dfine_hgnetv2_s_coco_120e.pth

epoches: 100
flat_epoch: 48
no_aug_epoch: 12
warmup_iter: 500

train_dataloader:
  total_batch_size: 16
  num_workers: 8
  dataset:
    transforms:
      policy:
        epoch: [4, 48, 88]
  collate_fn:
    mixup_epochs: [4, 48]
    stop_epoch: 88
    scale_low_ratio: 0.75
    scale_high_ratio: 1.25

val_dataloader:
  num_workers: 8
