__include__: [
  './dfine_hgnetv2_s_coco.yml',
]

output_dir: ./output/dfine_hgnetv2_s_dairv2x

tuning: pretrained/dfine_s_coco.pth

num_classes: 8
remap_mscoco_category: False

evaluator:
  type: CocoEvaluatorTrainLabelMapping
  iou_types: ['bbox']

epochs: 100

train_dataloader:
  total_batch_size: 16
  num_workers: 8
  dataset:
    img_folder: /root/autodl-fs/datasets/DAIR-V2X
    ann_file: /root/autodl-fs/datasets/DAIR-V2X/annotations/instances_train.json
    transforms:
      policy:
        epoch: 88
  collate_fn:
    stop_epoch: 88
    scale_low_ratio: 0.75
    scale_high_ratio: 1.25

val_dataloader:
  num_workers: 8
  dataset:
    img_folder: /root/autodl-fs/datasets/DAIR-V2X
    ann_file: /root/autodl-fs/datasets/DAIR-V2X/annotations/instances_val.json
