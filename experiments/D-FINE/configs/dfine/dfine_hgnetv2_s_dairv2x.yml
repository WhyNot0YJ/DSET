__include__: [
  './dfine_hgnetv2_s_coco.yml',
  '../dataset/dairv2x_detection.yml',
]

output_dir: ./output/dfine_hgnetv2_s_dairv2x

tuning: pretrained/dfine_s_coco.pth

epochs: 100

train_dataloader:
  total_batch_size: 16
  num_workers: 8
  dataset:
    transforms:
      policy:
        epoch: 88
  collate_fn:
    stop_epoch: 88
    scale_low_ratio: 0.75
    scale_high_ratio: 1.25

val_dataloader:
  num_workers: 8
