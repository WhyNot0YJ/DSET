# data_yaml：train / val 供 Ultralytics 训练与每轮验证；若含 test 与 labels_meta/test，
# 则 KITTI/多尺度 mAP 仅在训练结束后在 test 上评一次（见 base_yolo_trainer）。
# coco_data_root / detr_dataset_class / num_classes：供 RT-DETR / MoE-RT-DETR / CaS_DETR（见各 train.py）。
datasets:
  dairv2x:
    aliases:
      - dair-v2x
      - DAIR-V2X_YOLO
    data_yaml: "/root/autodl-fs/datasets/DAIR-V2X_YOLO/dairv2x.yaml"
    coco_data_root: "/root/autodl-fs/datasets/DAIR-V2X"
    detr_dataset_class: "DAIRV2XDetection"
    num_classes: 8
    class_names:
      - Car
      - Truck
      - Van
      - Bus
      - Pedestrian
      - Cyclist
      - Motorcyclist
      - Trafficcone

  uadetrac:
    aliases:
      - ua-detrac
      - UADETRAC_YOLO
      - UA-DETRAC_YOLO
    data_yaml: "/root/autodl-fs/datasets/UA-DETRAC_YOLO/data.yaml"
    coco_data_root: "/root/autodl-fs/datasets/UA-DETRAC_COCO"
    detr_dataset_class: "CocoFolderDetection"
    num_classes: 4
    class_names:
      - car
      - van
      - bus
      - others
