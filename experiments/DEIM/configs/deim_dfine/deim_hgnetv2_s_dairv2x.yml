__include__: [
  './deim_hgnetv2_s_coco.yml',
]

output_dir: ./outputs/deim_hgnetv2_s_dairv2x

num_classes: 8
remap_mscoco_category: False

epoches: 100
flat_epoch: 48
no_aug_epoch: 9

train_dataloader:
  dataset:
    img_folder: /root/autodl-fs/datasets/DAIR-V2X
    ann_file: /root/autodl-fs/datasets/DAIR-V2X/annotations/instances_train.json
    transforms:
      policy:
        epoch: [4, 48, 88]
  collate_fn:
    mixup_epochs: [4, 48]
    stop_epoch: 88

val_dataloader:
  dataset:
    img_folder: /root/autodl-fs/datasets/DAIR-V2X
    ann_file: /root/autodl-fs/datasets/DAIR-V2X/annotations/instances_val.json
