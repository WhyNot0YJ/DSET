__include__: [
  './deim_hgnetv2_s_coco.yml',
]

output_dir: ./outputs/deim_hgnetv2_s_uadetrac

tuning: pretrained/deim_dfine_hgnetv2_s_coco_120e.pth

num_classes: 4
remap_mscoco_category: False

epoches: 100
flat_epoch: 48
no_aug_epoch: 12
warmup_iter: 500

train_dataloader:
  total_batch_size: 16
  num_workers: 8
  dataset:
    img_folder: /root/autodl-fs/datasets/UA-DETRAC_COCO/train
    ann_file: /root/autodl-fs/datasets/UA-DETRAC_COCO/annotations/instances_train.json
    transforms:
      policy:
        epoch: [4, 48, 88]
  collate_fn:
    mixup_epochs: [4, 48]
    stop_epoch: 88
    scale_low_ratio: 0.75
    scale_high_ratio: 1.25

val_dataloader:
  num_workers: 8
  dataset:
    img_folder: /root/autodl-fs/datasets/UA-DETRAC_COCO/val
    ann_file: /root/autodl-fs/datasets/UA-DETRAC_COCO/annotations/instances_val.json
